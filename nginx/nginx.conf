events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    upstream backend  { server backend:8080; }
    upstream frontend { server frontend:80;  }

    # ── Порт 80: весь трафик через nginx ─────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Swagger UI ────────────────────────────────────────
        location /swagger-ui/ {
            proxy_pass         http://backend/swagger-ui/;
            proxy_set_header   Host $host;
        }
        location /swagger-ui.html {
            proxy_pass         http://backend/swagger-ui.html;
            proxy_set_header   Host $host;
        }
        location /v3/api-docs {
            proxy_pass         http://backend/v3/api-docs;
            proxy_set_header   Host $host;
        }
        location /api-docs {
            proxy_pass         http://backend/api-docs;
            proxy_set_header   Host $host;
        }
        location /webjars/ {
            proxy_pass         http://backend/webjars/;
            proxy_set_header   Host $host;
        }

        # ── Actuator (health check) ───────────────────────────
        location /actuator/ {
            proxy_pass         http://backend/actuator/;
            proxy_set_header   Host $host;
        }

        # ── API ───────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,Refresh-Token" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── WebSocket ─────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── Angular SPA (всё остальное) ───────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_intercept_errors off;
        }
    }

    # ── Порт 8080: прямой доступ к Spring Boot ───────────────
    server {
        listen 8080;
        server_name localhost;

        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 50m;
        }
    }
}
