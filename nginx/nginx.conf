events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Docker DNS resolver — нужен для lazy upstream resolution
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Переменные вместо upstream — nginx не падает если backend недоступен при старте
    server {
        listen 80;
        server_name localhost;

        # API → Spring Boot
        location /api/ {
            set $backend http://backend:8080;
            proxy_pass         $backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,Refresh-Token" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Actuator (health)
        location /actuator/ {
            set $backend http://backend:8080;
            proxy_pass $backend/actuator/;
            proxy_set_header Host $host;
        }

        # WebSocket
        location /ws/ {
            set $backend http://backend:8080;
            proxy_pass         $backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # OAuth2
        location /oauth2/ {
            set $backend http://backend:8080;
            proxy_pass $backend/oauth2/;
            proxy_set_header Host $host;
        }
        location /login/oauth2/ {
            set $backend http://backend:8080;
            proxy_pass $backend/login/oauth2/;
            proxy_set_header Host $host;
        }

        # Angular SPA
        location / {
            set $frontend http://frontend:80;
            proxy_pass         $frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_intercept_errors off;
            proxy_connect_timeout 5s;
        }
    }

    # Порт 8080 — прямой доступ к бэку
    server {
        listen 8080;
        server_name localhost;

        location / {
            set $backend http://backend:8080;
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 120s;
            proxy_connect_timeout 5s;
            client_max_body_size 50m;
        }
    }
}
