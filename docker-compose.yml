
services:

  # ─── MySQL ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: socialnet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: socialnet
      MYSQL_USER: socialnet_user
      MYSQL_PASSWORD: socialnet_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - socialnet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: socialnet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - socialnet-network

  # ─── MinIO (хранение файлов) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: socialnet-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - socialnet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Backend (Spring Boot) ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialnet-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/socialnet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: socialnet_user
      SPRING_DATASOURCE_PASSWORD: socialnet_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-min-256-bits
      JWT_EXPIRATION: 86400000
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - socialnet-network

  # ─── Frontend (Angular) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialnet-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - socialnet-network

  # ─── Nginx (reverse proxy) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: socialnet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - socialnet-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  socialnet-network:
    driver: bridge
